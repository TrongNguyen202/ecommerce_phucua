services:
  db:
    image: pgvector/pgvector:pg16
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mediaresolver

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: cloth_backend
    restart: unless-stopped

    environment:
      DATABASE_URL: postgres://postgres:mediaresolver@db:5432/postgres
      DEBUG: "True"
      SECRET_KEY: django-super-secret-key-change-in-production
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
      OPENAI_API_KEY: ${OPENAI_API_KEY}

    command: >
      sh -c "
      python manage.py wait_for_db &&
      python manage.py create_pgvector_extension &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn ecommerce_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --error-logfile -
      "

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  frontend:
    build:
      context: ./clothing-store
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://sundesign.io/api
        VITE_BANK_NUMBER: "0369298428"
        VITE_BANK_NAME: MBBank
        VITE_ACCOUNT_NAME: DANG VAN PHU

    container_name: cloth_frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:
  postgres_data: